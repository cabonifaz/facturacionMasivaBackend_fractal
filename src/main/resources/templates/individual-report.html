<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <style>
    @page {
      size: A4 landscape;
      margin: 1cm;
    }

    body {
      font-family: sans-serif;
      font-size: 10pt;
    }

    /* Estilos generales */
    .header-table,
    .main-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    .main-table th,
    .main-table td {
      border: 1px solid black;
      padding: 5px;
      vertical-align: top;
    }

    .header-bg {
      background-color: #042354;
      font-weight: bold;
      color: white;
      /* Asegura texto blanco en cabecera */
    }

    .title-header {
      text-transform: uppercase;
      text-align: center;
      color: #042354;
    }

    /* Estilo para la imagen del logo */
    .logo-img {
      width: 150px;
      height: auto;
    }

    .layout-table {
      width: 100%;
      border: none;
      border-collapse: collapse;
      margin: 16px 0px;
    }

    .layout-table td {
      border: none;
      padding: 0;
      vertical-align: top;
    }

    /* Estilos para las Tablas de Datos de Cabecera */
    .data-table {
      width: 100%;
      border-collapse: collapse;
    }

    .data-table td {
      border: 1px solid black;
      padding: 4px 8px;
      font-size: 10pt;
    }

    .label-cell {
      background-color: #042354;
      color: white;
      font-weight: bold;
      width: 30%;
    }

    .value-cell {
      background-color: white;
      color: black;
      text-align: center;
    }

    .color-fractal-yellow {
      color: #F7D334;
    }

    /* CRUCIAL: Para que los saltos de línea del Excel se vean en el PDF */
    .activity-text {
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

  <table style="width: 100%; margin-bottom: 20px;">
    <tr>
      <td style="width: 50%; vertical-align: top;">
        <img src="logo-fractal.jpg" class="logo-img" alt="Logo Fractal" />
      </td>
    </tr>
    <tr>
      <td>
        <h2 class="title-header">INFORME DE ACTIVIDADES DE SERVICIO BODYSHOPING</h2>
      </td>
    </tr>
  </table>

  <table class="layout-table">
    <tr>
      <td style="width: 40%;">
        <table class="data-table">
          <tr>
            <td class="label-cell">Empresa</td>
            <td class="value-cell" th:text="${report.company}">Fractal</td>
          </tr>
          <tr>
            <td colspan="2" style="border:none; height: 5px;"></td>
          </tr>
          <tr>
            <td class="label-cell">Colaborador</td>
            <td class="value-cell" th:text="${report.collaborator}">Name</td>
          </tr>
        </table>
      </td>

      <td style="width: 20%;"></td>

      <td style="width: 40%;">
        <table class="data-table">
          <tr>
            <td class="label-cell">Período</td>
            <td class="value-cell" th:text="${report.emissionDate}">Oct-25</td>
          </tr>
          <tr>
            <td colspan="2" style="border:none; height: 5px;"></td>
          </tr>
          <tr>
            <td class="label-cell">Perfil</td>
            <td class="value-cell" th:text="${report.profile}">Dev Senior</td>
          </tr>
        </table>
      </td>
    </tr>
  </table>

  <table class="main-table">
    <thead class="header-bg">
      <tr class="color-fractal-yellow">
        <th>Ticket</th>
        <th>OC/OS</th>
        <th>Periodo</th>
        <th>Nº Iniciativa</th>
        <th>Actividades realizadas</th>
        <th>Detalle Entregable</th>
        <th>Nota Ingreso</th>
        <th>Factura</th>
        <th>Feedback</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="item : ${report.details}">
        <td th:text="${item.ticket}"></td>
        <td th:text="${item.os}"></td>
        <td th:text="${item.activityPeriod}"></td>
        <td th:text="${item.initiativeNumber}"></td>

        <td>
          <span class="activity-text" th:text="${item.activities}"></span>
        </td>

        <td th:text="${item.deliverable}"></td>
        <td th:text="${item.incomingNote}"></td>
        <td th:text="${item.invoice}"></td>
        <td th:text="${item.feedback}"></td>
      </tr>
    </tbody>
  </table>

  <table style="width: 100%; margin-top: 16px; text-align: center;">
    <tr style="margin: 0 auto;">
      <td><img src="manager-signature.jpg" style="width: 200px; height: 100px;" alt="Firma gerente" /></td>
    </tr>
    <tr>
      <td>
        <hr style="width: 25%;" />
      </td>
    </tr>
    <tr>
      <td><span style="font-weight: bold;">Hugo Rodríguez Castillo</span></td>
    </tr>
    <tr>
      <td>Subgerente de operaciones</td>
    </tr>
  </table>

</body>

</html>
