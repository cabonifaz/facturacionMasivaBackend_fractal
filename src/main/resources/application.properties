spring.application.name=Facturacion Clientes

# ----------------------------------------------------
# 1. Configuración de la URL de la Base de Datos (SQL Server)
# ----------------------------------------------------
spring.datasource.url=${DB_URL}

# ----------------------------------------------------
# 2. Credenciales
# ----------------------------------------------------
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ----------------------------------------------------
# 3. Driver 
# ----------------------------------------------------
# Para SQL Server (Microsoft Data SQL Client):
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ----------------------------------------------------
# 4. Configuración adicional
# ----------------------------------------------------
# Pool de conexiones (Hikari por defecto en Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
# logging.level.com.zaxxer.hikari=INFO

# Dialecto de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false 

# --- DEBUGGING
logging.level.root=INFO
logging.level.org.app=DEBUG
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Configuracion Bsale API
bsale.api.url=${BSALE_URL}
bsale.api.token=${BSALE_TOKEN}